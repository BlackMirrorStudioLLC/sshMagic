name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel an in-progress review if a newer commit is pushed to the same PR,
# so rapid pushes don't stack up redundant reviews (saves usage).
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip Dependabot PRs: they're routine bot dependency bumps that don't need
    # an AI review, AND Dependabot-triggered runs can't read regular Actions
    # secrets (the OAuth token would always be empty), so the job would only
    # ever fail on them.
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      # Gracefully no-op (green, not red) when the review token isn't configured,
      # so the workflow doesn't hard-fail until the secret is added. Set it with:
      #   claude setup-token   # generates the token
      #   gh secret set CLAUDE_CODE_OAUTH_TOKEN   # paste it
      - name: Check for review token
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not set — skipping Claude review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anthropics/claude-code-action@536f2c32a39763739000b0e1ac69ca2647d97ce9  # v1
        if: steps.gate.outputs.skip != 'true'
        with:
          # Subscription (Pro/Max) auth. Generate locally with `claude setup-token`
          # and store as an org or repo secret named CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Keep the whole review in ONE top-level comment that updates in place,
          # instead of posting a new comment on every push.
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing this pull request. The PR branch is already
            checked out in the current working directory.

            Focus ONLY on genuinely important issues, in these categories:
            - Potential bugs or logic errors
            - Correctness
            - Security implications (this app shells out to ssh and scans the LAN)
            - Performance considerations

            Rules:
            - Be concise. Use short bullet points.
            - Skip minor style/formatting nitpicks (SwiftLint/swift-format handle those).
            - If you find no significant issues, say so briefly.
            - End your comment with a sign-off line:
              "✅ Approved" if no significant issues, or
              "⚠️ Issues found" if there are things to address.

            Post your review as a SINGLE top-level comment using `gh pr comment`.
            Do not submit the review text as a chat message.
          claude_args: |
            --model sonnet
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
